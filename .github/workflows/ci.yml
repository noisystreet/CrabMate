# 主 CI：编译检查、Clippy（-D warnings）与工作区测试，防止错误合入 main。
# 与 pre-commit 的 cargo clippy / frontend-wasm-check 对齐；cargo test 仅在本 workflow（及 code-complexity 金样）跑。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-clippy-test:
    name: check · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (OpenSSL / libssh2 / Wayland)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libssh2-1-dev libwayland-dev

      # edition 2024 需 Rust 1.85+；stable 满足即可。
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Add wasm32 target (frontend)
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (workspace, all targets)
        run: cargo check --workspace --all-targets --all-features

      - name: cargo check (crabmate default features)
        run: cargo check -p crabmate

      - name: cargo check (frontend wasm32)
        run: cargo check --manifest-path frontend/Cargo.toml --target wasm32-unknown-unknown --all-targets

      - name: cargo clippy (workspace, -D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo clippy (frontend, -D warnings)
        run: cargo clippy --manifest-path frontend/Cargo.toml --all-targets --all-features -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --all-features --no-fail-fast

      # desktop-tauri 是独立 workspace（含 Victauri E2E 测试）
      - name: Install Tauri system deps (libgtk-3 / libwebkit2gtk / libappindicator)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # tauri-build 校验 externalBin 存在性；CI 中 only check/test，创建 dummy sidecar
      - name: Create dummy sidecar for tauri-build
        run: |
          mkdir -p desktop-tauri/binaries
          touch desktop-tauri/binaries/crabmate-x86_64-unknown-linux-gnu

      - name: cargo check (desktop-tauri, all targets)
        run: cargo check --tests
        working-directory: desktop-tauri/src-tauri

      - name: cargo clippy (desktop-tauri, -D warnings)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: desktop-tauri/src-tauri

      - name: cargo test (desktop-tauri, Victauri auto-skip)
        run: cargo test --no-fail-fast
        working-directory: desktop-tauri/src-tauri

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (OpenSSL / libssh2 / Wayland)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libssh2-1-dev libwayland-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target (frontend)
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache frontend dist (Leptos)
        id: frontend-dist
        uses: actions/cache@v4
        with:
          path: frontend/dist
          key: frontend-dist-${{ runner.os }}-${{ hashFiles('frontend/src/**', 'frontend/index.html', 'frontend/Cargo.toml', 'frontend/Cargo.lock', 'frontend/package-lock.json', 'frontend/scripts/**', 'frontend/vendor/**', 'frontend/styles/**') }}
          restore-keys: |
            frontend-dist-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Build IDE editor bundle (CodeMirror)
        if: steps.frontend-dist.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm ci
          npm run build:editor

      - name: Build frontend (Leptos dist)
        if: steps.frontend-dist.outputs.cache-hit != 'true'
        run: |
          unset NO_COLOR
          unset CARGO_TERM_COLOR
          cd frontend && trunk build

      - name: Verify frontend dist present
        run: test -f frontend/dist/index.html

      - name: Build release binary (faster webServer in Playwright)
        run: cargo build --release -p crabmate

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: e2e
        run: |
          unset NO_COLOR
          npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
