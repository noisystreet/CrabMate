# Playwright E2E 测试（CI）
#
# 仅运行 mock SSE 测试（不依赖 LLM API）。
# 真实 LLM 测试仅在本地手动运行（自动读取 Tauri secrets 文件）：
#   cd e2e && npx playwright test specs/real-llm-*.spec.ts
#
# 前置：后端 `cargo run -- serve` 启动后，Playwright 测试以 headless Chromium 访问。

name: E2E Playwright

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-pw-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (OpenSSL / libssh2)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libssh2-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build backend (serve)
        run: cargo build -p crabmate --features web

      - name: Start backend server
        run: |
          cargo run -- serve &
          sleep 5
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; then
              echo "✅ 后端就绪 (尝试 $i)"
              break
            fi
            echo "⏳ 等待后端... (尝试 $i)"
            sleep 2
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          npm ci
          npx playwright install chromium
        working-directory: e2e

      - name: Run mock SSE tests
        run: npx playwright test specs/mock-overlay-timing.spec.ts --reporter=list
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: pkill -f "crabmate" || true
