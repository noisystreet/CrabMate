# 圈复杂度（lizard CCN）、函数形参棘轮（fn-param）与代码行数棘轮（fn-nloc：函数 nloc + 源文件行数），与 scripts/*.sh / pre-commit 对齐。
name: code-complexity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lizard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lizard
        run: pip install lizard

      - name: Run lizard (Rust, CCN threshold from repo script)
        run: bash scripts/lizard-rust.sh

      - name: Run fn-param ratchet (Rust parameter counts + allow lines)
        run: bash scripts/fn-param-ratchet.sh

      - name: Fetch base ref for fn-nloc baseline guard (PR only)
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=50

      - name: Run fn-nloc ratchet (Rust function nloc + file line counts)
        env:
          FN_NLOC_BASELINE_COMPARE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
          FN_NLOC_BASELINE_COMPARE_PUSH_BEFORE: ${{ github.event_name == 'push' && github.event.before || '' }}
        run: bash scripts/fn-nloc-ratchet.sh
