# 圈复杂度（lizard CCN）、函数形参棘轮（fn-param）与函数行数棘轮（fn-nloc），与 scripts/*.sh / pre-commit 对齐。
name: code-complexity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lizard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lizard
        run: pip install lizard

      - name: Run lizard (Rust, CCN threshold from repo script)
        run: bash scripts/lizard-rust.sh

      - name: Run fn-param ratchet (Rust parameter counts + allow lines)
        run: bash scripts/fn-param-ratchet.sh

      - name: Run fn-nloc ratchet (Rust function nloc lines)
        run: bash scripts/fn-nloc-ratchet.sh
