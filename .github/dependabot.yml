version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust

  - package-ecosystem: cargo
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "02:10"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
      - frontend

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
      day: monday
      time: "02:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
