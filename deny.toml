# https://embarkstudios.github.io/cargo-deny/
# 本地：cargo deny check（需 `cargo install cargo-deny`）；CI 见 `.github/workflows/dependency-security.yml`。

[graph]
all-features = true

[advisories]
version = 2

[licenses]
version = 2
confidence-threshold = 0.8
# 与常见 Rust 生态及 pre-commit/clippy 的 `--all-features` 对齐；强 copyleft（GPL/AGPL）不在此列，若引入将报错。
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "BSL-1.0",
    "Unicode-3.0",
    "MPL-2.0",
    "NCSA",
    # unicodeit：MIT + LaTeX 字体相关条款
    "LPPL-1.3c",
    # webpki-roots / webpki-root-certs 等 CA 数据
    "CDLA-Permissive-2.0",
]

# `ring` 的 Cargo 元数据不足以自动判定 SPDX 表达式。
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
