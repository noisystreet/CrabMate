# https://pre-commit.com
# 安装：pip install pre-commit && pre-commit install
#   （本配置含 default_install_hook_types，会同时安装 pre-commit + commit-msg；旧环境可补：pre-commit install --hook-type commit-msg）
# 手动跑检查：pre-commit run --all-files（不含 commit-msg；说明校验见 conventional-commits 规则中的手动命令）。workspace / frontend 的 clippy 与 wasm check 为全量，不依赖暂存区。
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (workspace)
        entry: cargo fmt --all --
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy
        name: cargo clippy (-D warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: lizard-rust
        name: lizard complexity (Rust CCN)
        entry: bash scripts/lizard-rust.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: fn-param-ratchet
        name: fn param cap (lizard max params ≤ 9)
        entry: bash scripts/fn-param-ratchet.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: fn-nloc-ratchet
        name: fn nloc + rust file lines (nloc ≤ 200, file ≤ 920)
        entry: bash scripts/fn-nloc-ratchet.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: frontend-wasm-check
        name: frontend wasm check
        entry: bash -c 'cd frontend && cargo check --target wasm32-unknown-unknown'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: frontend-clippy
        name: frontend clippy (-D warnings)
        entry: bash -c 'cd frontend && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      # cargo test（含 golden_sse_control / golden_intent_regression）仅在 CI 跑，见 .github/workflows/ci.yml 与 code-complexity.yml
      - id: taplo-format
        name: taplo format (check)
        entry: >-
          bash -c 'if command -v taplo >/dev/null 2>&1; then taplo format --check .; else echo "taplo 未安装，跳过"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: taplo-lint
        name: taplo lint
        entry: >-
          bash -c 'if command -v taplo >/dev/null 2>&1; then taplo lint .; else echo "taplo 未安装，跳过"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: https://github.com/crate-ci/typos
    rev: v1.35.5
    hooks:
      - id: typos

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          # 与 .cursor/rules/conventional-commits.mdc 中的 type 对齐
          - build
          - chore
          - ci
          - docs
          - feat
          - fix
          - perf
          - refactor
          - revert
          - style
          - test
