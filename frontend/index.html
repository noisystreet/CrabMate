<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrabMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Trunk 不会把 @import 打进单文件，也不会复制未声明的 CSS；须逐条声明，否则 dist 缺样式 -->
    <!-- components.css 中 brand-mark 背景图为 url("../brand-mark.svg")→打包后与 CSS 同目录上一级即站点根 /brand-mark.svg -->
    <link data-trunk rel="copy-file" href="brand-mark.svg" />
    <link data-trunk rel="css" href="styles/tokens.css" />
    <link data-trunk rel="css" href="themes/light.css" />
    <link data-trunk rel="css" href="themes/material.css" />
    <link data-trunk rel="css" href="themes/high-contrast.css" />
    <link data-trunk rel="css" href="styles/base.css" />
    <link data-trunk rel="css" href="styles/components.css" />
    <link data-trunk rel="css" href="styles/layout-chat.css" />
    <link data-trunk rel="css" href="styles/shell-topbar.css" />
    <link data-trunk rel="css" href="styles/ide-layout.css" />
    <link data-trunk rel="copy-file" href="vendor/ide-codemirror.js" data-target-path="vendor" />
    <link data-trunk rel="css" href="styles/ide-codemirror.css" />
    <link data-trunk rel="css" href="styles/ide-highlight.css" />
    <link data-trunk rel="css" href="styles/shell-ds.css" />
    <link data-trunk rel="css" href="styles/tauri-shell.css" />
    <link data-trunk rel="css" href="styles/sidebar.css" />
    <link data-trunk rel="css" href="styles/status.css" />
    <link data-trunk rel="css" href="styles/approval.css" />
    <link data-trunk rel="css" href="styles/modal.css" />
    <link data-trunk rel="css" href="styles/motion.css" />
  </head>
  <body>
    <script src="/vendor/ide-codemirror.js"></script>
    <!--
      Trunk：`trunk build`（默认 dev）不跑 wasm-opt，迭代快；`trunk build --release` 使用默认 wasm-opt。
      frontend/Cargo.toml 中 release profile 已设 opt-level="z" + lto=true + codegen-units=1，进一步压缩 WASM 体积。
      当前 release WASM：~9.7MB（raw）→ wasm-opt → ~3.4MB（gzip 后约 1.5MB）。
      wasm-opt 须在 PATH 中（`cargo install wasm-opt`），否则 trunk build --release 产出空文件。
      若要跳过 wasm-opt 可加 `data-wasm-opt="0"`（见 Trunk 文档）。
    -->
    <link data-trunk rel="rust" />
  </body>
</html>
