<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrabMate</title>
    <!-- 本地字体 + 合并 CSS（scripts/bundle-frontend-css.sh）；桌面 WebView 避免 Google Fonts CDN 与多文件往返 -->
    <link data-trunk rel="copy-dir" href="fonts" />
    <link data-trunk rel="copy-file" href="brand-mark.svg" />
    <link data-trunk rel="css" href="styles/app.bundle.css" />
    <link data-trunk rel="copy-file" href="vendor/ide-codemirror.js" data-target-path="vendor" />
  </head>
  <body>
    <!--
      CodeMirror 仅在进入 IDE 模式时由 ide_codemirror.rs 动态加载 /vendor/ide-codemirror.js。
      Trunk：`trunk build`（默认 dev）不跑 wasm-opt；`trunk build --release` 使用 wasm-opt。
    -->
    <link data-trunk rel="rust" />
  </body>
</html>
