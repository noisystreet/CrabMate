# 规划 / 反思 / 编排模式嵌入默认（reflection、终答规划、planner/executor、分阶段规划等）。
# 与 `config/default_config.toml`、`config/session.toml`、`config/context_inject.toml`、`config/tools.toml`、`config/sandbox.toml` 在 `load_config` 中顺序合并（本文件在其后，再后为 **`config/memory.toml`**），再被 config.toml / .agent_demo.toml 与 CM_* 覆盖。

[agent]

reflection_default_max_rounds = 5
final_plan_requirement = "workflow_reflection"
plan_rewrite_max_attempts = 2
final_plan_require_strict_workflow_node_coverage = false
final_plan_semantic_check_enabled = false
final_plan_semantic_check_max_non_readonly_tools = 0
final_plan_semantic_check_max_tokens = 256
planner_executor_mode = "single_agent"
staged_plan_execution = true
# staged_plan_allow_no_task = true   # 兼容旧键，已无效果（no_task 见内置 schema 规则）
# staged_plan_phase_instruction = """……"""
# 典型「计划—执行—校验」闭环：验收失败或步内工具失败时回灌 planner 重规划（多耗 API）；需整轮遇错即停可改 fail_fast。
staged_plan_feedback_mode = "patch_planner"
staged_plan_patch_max_attempts = 3
staged_plan_cli_show_planner_stream = false
staged_plan_optimizer_round = true
# 默认可在无非行批内建工具时仍跑步骤优化轮（利于纯串行任务收紧/合并步骤）；介意多一次 LLM 可改 true。CM_STAGED_PLAN_OPTIMIZER_REQUIRES_PARALLEL_TOOLS
staged_plan_optimizer_requires_parallel_tools = false
staged_plan_ensemble_count = 1
staged_plan_skip_ensemble_on_casual_prompt = true
# 默认关：与 finalize 缺省及文档一致；若开 true，桥接 user 已标明「非用户提问」，避免模型把续问句误当用户原话。
staged_plan_two_phase_nl_display = false   # CM_STAGED_PLAN_TWO_PHASE_NL_DISPLAY
# 为 true 时：架构/咨询类 Execute 命中启发式则绕过分阶段、走单 Agent 外循环；默认 false 仍走滚动分阶段。
staged_plan_intent_gate_advisory_bypass = false
# 仅在 advisory_bypass=true 时生效：向内置词表追加短语（非替换）；无 CM_*，见 docs/配置说明.md「分阶段意图门控」。
# staged_plan_advisory_bypass_extra_impl_blockers = ["请落地", "ship it"]
# staged_plan_advisory_bypass_extra_arch_markers = ["领域驱动"]
# staged_plan_advisory_bypass_extra_consult_markers = ["你怎么看"]

# 首轮定稿 agent_reply_plan 是否作为后续滚动/补丁规划的蓝图锚点：immutable_goal_only（默认）| goal_plus_baseline_plan | strict_baseline_steps；CM_STAGED_PLAN_BASELINE_MODE
staged_plan_baseline_mode = "immutable_goal_only"

# 分层模式意图管线（默认 L2 无工具 LLM；旧 L0/L1 规则层仅作 L2 不可用时兜底；见 CONFIGURATION/DEVELOPMENT）
# intent_l2_enabled = true
# intent_l2_min_confidence = 0.7   # 观测阈值；不再控制是否回退 L1
# intent_l0_routing_boost_enabled = true   # 仅影响弃用 L1 兜底路径
# 非分层（planner_executor_mode != hierarchical）可单独覆盖执行阈值；省略时回退 intent_execute_*。
# intent_non_hier_execute_low_threshold = 0.2
# intent_non_hier_execute_high_threshold = 0.45
