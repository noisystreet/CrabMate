# 内置工具嵌入默认：run_command 白名单/超时/工作目录、工具结果入模与 DSML、只读并行与单轮 read_file 缓存、
# 测试输出缓存、会话变更集注入、天气/联网搜索/http_fetch、工具解释卡、MCP 等。（**SyncDefault Docker 沙盒**见 **`config/sandbox.toml`**。）
# 与 `config/default_config.toml`、`config/session.toml`、`config/context_inject.toml` 在 `load_config` 中顺序合并（本文件在 context_inject 之后），再被 config.toml / .agent_demo.toml 与 AGENT_* 覆盖。
# 有效命令白名单仅为 **`allowed_commands`**（无环境分表）。

[agent]

# --- run_command（子进程）---
command_timeout_secs = 600
command_max_output_len = 8192
# 命令白名单（小写）；可被覆盖配置或 AGENT_ALLOWED_COMMANDS 整体替换。
# 下列按类别用注释分段，仅为可读性；解析结果仍是单一数组（顺序不影响白名单语义）。
allowed_commands = [
    # Autotools
    "aclocal",
    "autoconf",
    "automake",
    "autoreconf",
    # GNU Binutils / 链接与符号
    "ar",
    "c++filt",
    "ld",
    "nm",
    "objdump",
    "readelf",
    "size",
    "strings",
    # 编译与构建
    "cargo",
    "clang",
    "clang++",
    "cmake",
    "ctest",
    "g++",
    "gcc",
    "make",
    "ninja",
    "pkg-config",
    "rustc",
    # 版本控制与语言运行时
    "git",
    # GitHub CLI（需本机安装；与 git 相同须遵守 run_command 参数规则）
    "gh",
    "gradle",
    "mvn",
    "npm",
    "podman",
    "python3",
    # 容器 CLI（与 SyncDefault Docker 沙盒的 Engine API 不同；供内置 docker_* / podman_* 工具）
    "docker",
    # 搜索与路径解析
    "egrep",
    "fgrep",
    "file",
    "find",
    "grep",
    "which",
    "whereis",
    # 结构化文本（JSON 等）
    "jq",
    # 文本与表格（coreutils 类）
    "basename",
    "cat",
    "cmp",
    "column",
    "cut",
    "diff",
    "dirname",
    "echo",
    "expand",
    "fmt",
    "fold",
    "head",
    "join",
    "mkdir",
    "nl",
    "paste",
    "rev",
    "seq",
    "sort",
    "tac",
    "tail",
    "tr",
    "tree",
    "unexpand",
    "uniq",
    "wc",
    # 环境变量与路径元数据
    "date",
    "df",
    "du",
    "env",
    "printenv",
    "pwd",
    "readlink",
    "realpath",
    "stat",
    # 系统与进程信息
    "free",
    "hostname",
    "id",
    "ls",
    "lsblk",
    "lscpu",
    "nproc",
    "ps",
    "uptime",
    "whoami",
    "uname",
    # 压缩流读出
    "bzcat",
    "xzcat",
    "zcat",
    # 十六进制与动态链接查看
    "hexdump",
    "ldd",
    "od",
    "xxd",
]
run_command_working_dir = "."

# --- 工具消息形态与 DeepSeek DSML ---
tool_message_max_chars = 32768
tool_result_envelope_v1 = true
# 为 true 时 SSE `tool_call` 另含脱敏后的 `arguments`（更长上限）；默认 false，防浏览器/共享屏泄露。
# sse_tool_call_include_arguments = false
materialize_deepseek_dsml_tool_calls = true

# --- 单轮并行只读工具与 read_file 缓存（与 Web 队列协同；chat_queue 仍在 default_config）---
# 单轮并行只读工具批 spawn_blocking 最大并发；默认 max(chat_queue_max_concurrent, 3)
# parallel_readonly_tools_max = 4
read_file_turn_cache_max_entries = 64

# --- 测试输出缓存与会话变更集（工具写盘追踪注入）---
test_result_cache_enabled = true
test_result_cache_max_entries = 32
session_workspace_changelist_enabled = true
session_workspace_changelist_max_chars = 12000

# --- 内置工具超时与联网（可选）---
weather_timeout_secs = 15
# web_search_provider = "brave"
# web_search_api_key = ""
# web_search_timeout_secs = 30
# web_search_max_results = 8
# http_fetch_allowed_prefixes = ["https://doc.rust-lang.org/", "https://example.com/api/"]
# http_fetch_timeout_secs = 30
# http_fetch_max_response_bytes = 524288

# --- 工具解释卡（可选）---
# tool_call_explain_enabled = false
# tool_call_explain_min_chars = 8
# tool_call_explain_max_chars = 400

# --- 代码语义检索（codebase_semantic_search 工具；本地 fastembed + SQLite，索引默认 .crabmate/codebase_semantic.sqlite）---
codebase_semantic_search_enabled = true
# 写工具成功或本轮已标记 workspace_changed 后删除索引中相关块（run_command 等无法解析路径时整表清空）
codebase_semantic_invalidate_on_workspace_change = true
# codebase_semantic_index_sqlite_path = ".crabmate/codebase_semantic.sqlite"
codebase_semantic_max_file_bytes = 524288
codebase_semantic_chunk_max_chars = 1200
codebase_semantic_top_k = 8
# 单次 query 最多扫描的向量块数；0=不限制（大索引慎用）
codebase_semantic_query_max_chunks = 50000
codebase_semantic_rebuild_max_files = 2000
# 整库 rebuild_index 默认按文件指纹跳过未改文件（加速大仓）；单次强制全量可在工具参数传 incremental:false
codebase_semantic_rebuild_incremental = true
# hybrid 检索：向量权重 α（0=纯全文，1=纯向量）
codebase_semantic_hybrid_alpha = 0.55
# FTS 分支最多取多少条（BM25）
codebase_semantic_fts_top_n = 400
# hybrid 时向量侧候选池大小（≥ top_k）
codebase_semantic_hybrid_semantic_pool = 256

# --- MCP（stdio 客户端，可选）---
# mcp_enabled = false
# mcp_command = ""
# mcp_tool_timeout_secs = 60

# --- 工具注册表策略（可选 `[tool_registry]`；与上方 `[agent]` 同文件合并进 `AgentConfig`）---
# 示例（取消注释后置于本文件或主 `config.toml` 中）：
# [tool_registry]
# # `http_fetch` / `http_request` 在 spawn_blocking 外圈的 tokio::time::timeout（秒）；省略则取 max(command_timeout_secs, http_fetch_timeout_secs)。
# http_fetch_wall_timeout_secs = 120
# http_request_wall_timeout_secs = 120
# parallel_sync_denied_tools = ["custom_lock_tool"]
# parallel_sync_denied_prefixes = ["mybuild_"]
# sync_default_inline_tools = ["get_current_time"]
# write_effect_tools = ["create_file", "modify_file"]
# 分阶段 steps[].executor_kind 子代理：在默认补丁/测试名之外额外允许的工具名（须本会话已注册）
sub_agent_patch_write_extra_tools = ["run_command"]
sub_agent_test_runner_extra_tools = ["custom_test_runner"]
# review_readonly 步内显式拒绝（精确匹配）
sub_agent_review_readonly_deny_tools = ["risky_readonly_tool"]
# # 并行只读批与 SyncDefault+spawn_blocking 墙上时钟：键与 ToolExecutionClass 蛇形一致（workflow, command_spawn_timeout, …, blocking_sync）。
# [tool_registry.parallel_wall_timeout_secs]
# blocking_sync = 600
# http_fetch_spawn_timeout = 90
