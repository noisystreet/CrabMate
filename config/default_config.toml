# CrabMate 嵌入默认配置（可被 config.toml / .agent_demo.toml 及 CM_* 环境变量覆盖）
# 以下为 [agent] 扁平键；按功能分节编排，便于检索（解析器不依赖注释顺序）。

[agent]

# 1. LLM 网关（OpenAI 兼容 chat/completions）
api_base = "https://api.deepseek.com/v1"
model = "deepseek-chat"
# 鉴权密钥：仅认环境变量 API_KEY（或进程继承）；勿将真实密钥写入本文件。本程序不读取 TOML 中的 api_key 键。
# 模型 HTTP 鉴权：bearer（默认，需环境变量 API_KEY）| none（不向 chat/models 发 Authorization；本地 Ollama 等可不设 API_KEY）
# llm_http_auth_mode = "bearer"
# 完成段上限；开启推理/思维链时易占满较小额度导致 finish_reason=length。可按供应商与费用调高。
max_tokens = 4096
# 模型上下文窗口 token 上限（输入+输出）；用于推导会话同步裁剪的近似字符预算（与 context_char_budget 取更小）。示例：DeepSeek 常见 64k；设为 0 则不因窗口推导裁剪。
llm_context_tokens = 65536
# 注意：一些模型只支持设置固定的温度，如kimi-k2.5系列模型。
temperature = 0.7

# 智谱 GLM（OpenAI 兼容）：api_base = "https://open.bigmodel.cn/api/paas/v4" ，model = "glm-5" ；与官方最小 cURL（仅 model/messages/stream）一致时保持 llm_bigmodel_thinking = false（默认）；深度思考见 GLM-5 文档 thinking 字段时用 llm_bigmodel_thinking = true ；CM_LLM_BIGMODEL_THINKING
# llm_bigmodel_thinking = false

# Moonshot Kimi：api_base = "https://api.moonshot.cn/v1" ，model 如 kimi-k2.5；文档见 platform.moonshot.cn Chat API；仅在 model 为 kimi-k2.5 系列时生效：关闭默认思考 llm_kimi_thinking_disabled = true ；CM_LLM_KIMI_THINKING_DISABLED
# llm_kimi_thinking_disabled = false

# 可选：写入 chat/completions 的整数 seed；省略则请求 JSON 不带该字段
# llm_seed = 42
api_timeout_secs = 600
api_max_retries = 3
api_retry_delay_secs = 1

# 2. 对话历史、上下文预算与摘要
max_message_history = 24
context_char_budget = 200000
context_min_messages_after_system = 4
context_summary_trigger_chars = 0
context_summary_tail_messages = 12
context_summary_max_tokens = 1024
context_summary_transcript_max_chars = 120000

# 3. 内置工具（run_command、工具入模、缓存、联网工具、MCP、解释卡等）
# 默认见 **`config/tools.toml`**
# 可选：进程内工具调用统计，新会话首条 system 末尾附加短提示（单进程全局滑动窗口，不按会话分桶）
# agent_tool_stats_enabled = false
# agent_tool_stats_window_events = 200
# agent_tool_stats_min_samples = 5
# agent_tool_stats_max_chars = 800
# agent_tool_stats_warn_below_success_ratio = 0.65

# 4. CLI 会话（tui_session.json 等）
# 默认见 **`config/session.toml`**

# 5. Web 对话队列（并发上限；单轮只读工具并行与 read_file 缓存见 **`config/tools.toml`**）
# GET /health 可选：对当前 api_base 发 GET …/models（列表接口，无 chat 计费；默认关）。CM_HEALTH_LLM_MODELS_PROBE
health_llm_models_probe = false
# 开启时探测结果进程内缓存秒数（5–86400），降低 kube 等高频 /health 对上游压力。CM_HEALTH_LLM_MODELS_PROBE_CACHE_SECS
health_llm_models_probe_cache_secs = 120

chat_queue_max_concurrent = 2
chat_queue_max_pending = 32

# 6. 规划 / 反思 / 编排模式
# 默认见 **`config/planning.toml`**

# 7. 系统提示词与 Cursor 式规则注入
cursor_rules_enabled = true
cursor_rules_dir = ".cursor/rules"
cursor_rules_include_agents_md = true
cursor_rules_max_chars = 48000
# 项目级 skills（CrabMate 约定目录）。读取 `skills_dir/*.md` 并附加到 system prompt。
skills_enabled = true
skills_dir = ".crabmate/skills"
skills_max_chars = 32000
skills_top_k = 4
# 系统提示词：默认 L0 正文在 **`config/prompts/base_system_prompt.md`**（改文件无需重编二进制）。相对路径依次尝试：进程当前目录、各覆盖配置文件所在目录（后加载的优先）、run_command_working_dir。
# 覆盖：内联 system_prompt（低于文件）或改 system_prompt_file；环境变量 CM_SYSTEM_PROMPT、CM_SYSTEM_PROMPT_FILE（后者可为绝对路径）。
system_prompt_file = "config/prompts/base_system_prompt.md"
# 新会话首条 system 末附「思考纪律」附录（减轻模型在 thinking 中复述系统提示）；软性约束。CM_THINKING_AVOID_ECHO_SYSTEM_PROMPT
thinking_avoid_echo_system_prompt = true
# 附录正文默认文件（与 system_prompt_file 相同路径解析）；亦可 thinking_avoid_echo_appendix 内联。CM_THINKING_AVOID_ECHO_APPENDIX_FILE
thinking_avoid_echo_appendix_file = "config/prompts/thinking_avoid_echo_appendix.md"

# 8. Web 服务安全与会话持久（默认将会话 transcript 落盘到工作区 .crabmate/）
conversation_store_sqlite_path = ".crabmate/conversations.db"
# 受保护 API（/chat*、/workspace* 等）：非空时要求 Authorization: Bearer <本值> 或 X-API-Key: <本值>（二选一）
# web_api_bearer_token = ""
# 为 true（默认）时 serve 启动前必须配置非空的 web_api_bearer_token（含仅监听 127.0.0.1）。本地纯匿名调试可设为 false。CM_WEB_API_REQUIRE_BEARER
web_api_require_bearer = false
# 为 true（默认）时，成功执行的写副作用工具在日志中打一行 target=crabmate::audit_write_tool（无密钥；含时间、IP、共享密钥 SHA-256 前 12 位十六进制、工具名与脱敏 args 预览）。CM_WEB_AUDIT_LOG_WRITE_TOOLS
# web_audit_log_write_tools = true
# 为 true 时 client_ip 优先取 X-Forwarded-For 首跳（仅置于可信反向代理后）。CM_WEB_AUDIT_TRUST_X_FORWARDED_FOR
# web_audit_trust_x_forwarded_for = false
# allow_insecure_no_auth_for_non_loopback = false
# workspace_allowed_roots = []

# 9. 首轮上下文注入：备忘、项目画像、依赖摘要
# 默认见 **`config/context_inject.toml`**

# 10. 长期记忆（可选）
# 默认见 **`config/memory.toml`**

# 覆盖 system_prompt：内联优先级低于 system_prompt_file；可用环境变量 CM_SYSTEM_PROMPT / CM_SYSTEM_PROMPT_FILE
# system_prompt = """……"""
