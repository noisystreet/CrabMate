# 可选多角色：与 `config/default_config.toml` 等一并被 `load_config` 合并（未使用 `--config` 时读取本文件）。
# 若使用 `crabmate --config path/to/foo.toml`，则改为读取同目录下的 `agent_roles.toml`。
# 完整说明见 docs/CONFIGURATION.md「多角色（agent_roles）」。
#
# 示例（取消注释并定义 id 后生效）：
# [agent_roles]
# default_role = "code"
#
# [agent_roles.roles.code]
# system_prompt = "You are a concise assistant for coding tasks."
#
# [agent_roles.roles.reviewer]
# system_prompt_file = "config/prompts/reviewer.md"

[agent_roles]
# 内置陪聊角色：Web 新会话「角色」选 companion；CLI：`--agent-role companion`
[agent_roles.roles.companion]
system_prompt_file = "config/prompts/companion_system_prompt.md"

# 内置科学家向角色：强调证据层级、不确定性与可检验性；CLI：`--agent-role scientist`
[agent_roles.roles.scientist]
system_prompt_file = "config/prompts/scientist_system_prompt.md"

# 内置工程师向角色：交付、权衡、可靠性与可运维；CLI：`--agent-role engineer`
[agent_roles.roles.engineer]
system_prompt_file = "config/prompts/engineer_system_prompt.md"

# 内置哲学向角色：概念澄清、论证结构与传统比较；CLI：`--agent-role philosopher`
[agent_roles.roles.philosopher]
system_prompt_file = "config/prompts/philosopher_system_prompt.md"

# 内置文学向角色：细读、体裁脉络与写作技艺；CLI：`--agent-role literary`
[agent_roles.roles.literary]
system_prompt_file = "config/prompts/literary_system_prompt.md"

# 内置代码审阅员：缺陷与风险结构化评审；CLI：`--agent-role code_reviewer`
[agent_roles.roles.code_reviewer]
system_prompt_file = "config/prompts/code_reviewer_system_prompt.md"
