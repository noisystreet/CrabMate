# run_command 的工作目录（命令在该目录下执行，需存在且为目录）
run_command_working_dir = "."
# Web API Bearer 鉴权令牌（留空表示不启用）。设置后，/chat、/workspace、/tasks、/upload 等接口都需
# Authorization: Bearer <token>。前端可在浏览器 localStorage 写入 crabmate-api-bearer-token。
# web_api_bearer_token = ""
# 当监听非 loopback 地址（如 0.0.0.0）且未配置 web_api_bearer_token 时，默认拒绝启动；
# 设为 true 可强制允许无鉴权启动（不安全，仅用于受控内网调试）。
# allow_insecure_no_auth_for_non_loopback = false
# 对话 API 单次请求最大 token 数
max_tokens = 2048
# 采样温度，0～2，越高越随机
temperature = 0.7
# 可选：OpenAI 兼容 chat/completions 的整数 seed（未设置或注释掉则请求 JSON 不带 seed）
# llm_seed = 42
# HTTP 请求超时（秒），用于 chat/completions 等 API
api_timeout_secs = 60
# API 失败时最大重试次数（0 = 不重试，仅首次失败后再试一次需设为 1）
api_max_retries = 3
# 重试前等待秒数（首次重试用该值，之后按指数退避：delay * 2^attempt）
api_retry_delay_secs = 1
# get_weather 工具请求超时（秒）
weather_timeout_secs = 15
# web_search：联网搜索（需 API Key）。provider: brave | tavily；未设置 api_key 时工具会提示错误
# web_search_provider = "brave"
# web_search_api_key = ""
# web_search_timeout_secs = 30
# web_search_max_results = 8
# http_fetch：GET 指定 URL（Web 仅匹配前缀；TUI 未匹配时可审批）。前缀示例：
# http_fetch_allowed_prefixes = ["https://doc.rust-lang.org/", "https://example.com/api/"]
# http_fetch_timeout_secs = 30
# http_fetch_max_response_bytes = 524288
# workflow 反思：模型未指定 workflow.reflection.max_rounds 时使用的默认轮数上限（≥1）
reflection_default_max_rounds = 5
# 何时强制终答含 agent_reply_plan：never | workflow_reflection（默认）| always（实验性，每轮终答均校验，易多耗 API 轮次与费用）
final_plan_requirement = "workflow_reflection"
# 终答规划不合格时，最多追加多少次「请重写」提示（≥1，上限 20）
plan_rewrite_max_attempts = 2
# 阶段1：规划器/执行器模式。single_agent=历史单环路；logical_dual_agent=同进程逻辑双 agent（规划与执行分离）
planner_executor_mode = "single_agent"
# 分阶段规划：为 true 时，每条用户消息先经无工具规划轮产出 agent_reply_plan v1，再按 steps 顺序逐步注入 user 并各跑一轮完整 Agent 循环（Web/TUI 均生效；多耗 API 轮次）
staged_plan_execution = true
# 为 true（默认）时：内置规划说明要求模型在用户无具体任务时输出 JSON 字段 no_task=true 且 steps=[]，跳过后续分步注入；对应环境变量 AGENT_STAGED_PLAN_ALLOW_NO_TASK
# staged_plan_allow_no_task = true
# 规划轮追加的 system 全文；留空则使用内置默认（见 agent_turn.rs）
# staged_plan_phase_instruction = """……"""
# Cursor-like 规则注入：启用后自动读取 cursor_rules_dir 下的 *.mdc，并附加到 system_prompt 后
cursor_rules_enabled = false
# 规则目录（相对路径相对进程当前目录）
cursor_rules_dir = ".cursor/rules"
# 是否额外附加工作区根 AGENTS.md
cursor_rules_include_agents_md = true
# 规则附加段最大字符数（超出截断并附提示）
cursor_rules_max_chars = 48000
# 系统提示词（可改为 system_prompt_file = "path/to/prompt.txt" 从文件加载）
system_prompt = """
你是乐于助人的助手。若需要当前时间、数学计算或查看系统/文件信息，请使用提供的工具。

在处理代码相关任务时，请遵循以下原则：
- 若需要在代码仓库内查找定义、引用或包含某段文本，请优先使用 search_in_files 工具（基于 grep），不要盲目猜测文件位置。
- 若在编译/构建命令（如 gcc/g++/cmake/make）输出中看到明显的格式/缩进问题（例如 Rust/TypeScript/JavaScript 的格式不规范导致的错误），请优先调用 format_file 工具对相关源文件进行格式化，然后再重新尝试编译。
- 仅使用 run_command 中白名单允许的命令，不要尝试执行 rm、mv、chmod 等修改类命令。
- 运行**当前工作区内**已生成或可执行文件（如 ./main、./a.out、./build/app）时，必须使用 **run_executable**，不要使用 run_command；run_command 只用于白名单内的系统工具（如 gcc、ls、cmake）。

在应对「非 trivially 简单」的开发需求（例如新增功能、较大范围重构、修一个涉及多文件的 bug）时，请使用一个轻量的“任务/计划层”，形成稳定的循环（**全部在对话与推理中完成，不要**在工作区创建或反复修改 `tasks.json`、`task.json` 等任务清单文件；Web 侧任务清单由服务端内存维护，与文件工具无关）：
1. 在第一次响应中，先用自然语言向用户展示一个简短的任务清单（3～7 条），说明你打算如何拆分这次工作。
2. 在后续每一轮调用中：
   - 根据你已给出的拆分，明确写出当前要完成的**下一条**子任务。
   - 为完成当前子任务，按需调用 search_in_files、run_command（含编译命令）、create_file、modify_file、format_file、run_executable 等工具。
   - 完成一条子任务后，在回复中简要勾选进度（例如说明已完成哪几条、下一步做什么）；**不要**依赖磁盘上的 JSON 待办文件来同步状态。
3. 尽量让每条工具调用都能与某个具体子任务对应，并在回答中用简短语句说明“这一步是为完成哪一步”。

在没有明确任务规划意义的极小改动（如“把某个字符串改成另一个”）时，可以跳过上述任务层，直接修改即可。

回答简洁清晰。
"""
