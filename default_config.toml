# 默认配置（API 基础地址、模型与运行参数）
# 可被 config.toml / .agent_demo.toml 或环境变量覆盖

[agent]
api_base = "https://api.deepseek.com/v1"
model = "deepseek-reasoner"
# 运行环境：dev / prod，用于按环境切换命令白名单等安全策略；默认 dev
env = "dev"
# 保留的最近对话轮数（user+assistant 算一轮）
max_message_history = 24
# TUI 启动时是否从 .crabmate/tui_session.json 恢复上次对话（默认 false，仅空白会话 + 当前 system_prompt）
tui_load_session_on_start = false
# 当 tui_load_session_on_start 为 true 时：从会话文件加载的消息条数上限（含 system）；超出则丢弃最旧非 system 消息（默认 400，有效范围 2～50000）
tui_session_max_messages = 400
# role: tool 的正文超过此字符数时在每次调模型前截断（近似 token 控制）
tool_message_max_chars = 32768
# 为 true（默认）时：写入历史的 role: tool 使用 JSON 信封 crabmate_tool（含 summary、ok、output 等），便于聚合/解析；为 false 时保持工具原始字符串
tool_result_envelope_v1 = true
# 为 true（默认）时：API 未给可用原生 tool_calls 时从正文 DeepSeek DSML 物化；为 false 时仅信任 API tool_calls（结构化网关可关）
materialize_deepseek_dsml_tool_calls = true
# 非 system 消息总字符预算（近似）；0 = 不启用按字符删旧消息
context_char_budget = 0
# 启用 context_char_budget 时，system 之后至少保留的消息条数
context_min_messages_after_system = 4
# 非 system 总字符超过此值时触发一次 LLM 摘要；0 = 关闭（需 API_KEY）
context_summary_trigger_chars = 0
# 摘要后保留的尾部消息条数（须与最近工具轮对齐，不宜过小）
context_summary_tail_messages = 12
# 摘要请求的 max_tokens
context_summary_max_tokens = 1024
# 送入摘要模型的中间段转写最大字符数
context_summary_transcript_max_chars = 120000
# Web 会话：非空则将会话存 SQLite（重启后续聊，路径可绝对或相对进程 cwd）。留空则仅进程内内存（重启丢失）。
# conversation_store_sqlite_path = ".crabmate/conversations.db"
# Web 首轮：从工作区根下相对路径读取备忘 Markdown，注入为 user 条（用户/项目约定）。需 agent_memory_file_enabled = true。
# agent_memory_file_enabled = false
# agent_memory_file = ".crabmate/agent_memory.md"
# agent_memory_file_max_chars = 8000
# Web 新会话首轮：在备忘（若有）之外注入自动生成的「项目画像」Markdown（只读扫描 + 可选 cargo metadata --no-deps）。默认 true。
# project_profile_inject_enabled = true
# 项目画像正文最大字符数；0 表示不生成画像正文（侧栏与首轮均为空）。默认 6000。
# project_profile_inject_max_chars = 6000
# 工具调用「解释卡」：为 true 时，非只读内置工具（run_command、写文件、http_request、git 写等）须在 JSON 顶层带字符串 crabmate_explain_why（一句目的）；执行前剥离。默认 false。
# tool_call_explain_enabled = false
# crabmate_explain_why 最短/最长字符数（Unicode 标量计数）。
# tool_call_explain_min_chars = 8
# tool_call_explain_max_chars = 400
# MCP（Model Context Protocol）stdio 客户端：默认关闭；启用后每轮对话启动 mcp_command 子进程并合并远端工具（见 README / DEVELOPMENT）
# mcp_enabled = false
# mcp_command = ""
# mcp_tool_timeout_secs = 60

# 长期记忆（路线图分阶段实现；当前仅占位配置，默认关闭）
# long_term_memory_enabled = false
# long_term_memory_scope_mode = "conversation"
# long_term_memory_vector_backend = "disabled"
