[package]
name = "crabmate-agent"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "CrabMate agent domain layer (plan artifacts, intent routing, acceptance, reflection)"

[dependencies]
crabmate-config = { path = "../crabmate-config" }
crabmate-internal = { path = "../crabmate-internal" }
crabmate-llm = { path = "../crabmate-llm" }
crabmate-types = { path = "../crabmate-types" }
log = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
crabmate-config = { path = "../crabmate-config" }
